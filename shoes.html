<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Soleil — Campaigns</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.cat-hero{padding:160px 60px 70px;position:relative;overflow:hidden;border-bottom:1px solid var(--line)}
.cat-hero-bg{position:absolute;inset:0;opacity:.08;background-size:cover;background-position:center;filter:blur(20px) saturate(1.5)}
.cat-hero-inner{position:relative;z-index:1;display:flex;align-items:flex-end;justify-content:space-between;gap:40px;flex-wrap:wrap}
.cat-hero-icon{font-size:56px;line-height:1;margin-bottom:12px;display:block}
.cat-hero h1{font-family:var(--ff-d);font-weight:500;font-style:italic;font-size:clamp(52px,8vw,110px);line-height:.9;letter-spacing:-.02em;margin:8px 0 18px}
.cat-hero p{font-size:16px;line-height:1.65;color:rgba(244,237,226,.58);max-width:520px;font-weight:300}
.cat-hero-stats{display:flex;gap:40px;flex-shrink:0}
.stat{text-align:center}
.stat-num{font-family:var(--ff-d);font-size:42px;font-weight:500;color:var(--champ);line-height:1}
.stat-label{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:rgba(244,237,226,.45);margin-top:5px}
@media(max-width:860px){.cat-hero{padding:120px 22px 56px}.cat-hero-stats{display:none}}

.campaigns-section{padding:70px 60px 100px}
.campaigns-section h2{font-family:var(--ff-d);font-style:italic;font-size:28px;margin-bottom:32px;color:rgba(244,237,226,.6)}
.no-campaigns{text-align:center;padding:100px 40px}
.no-campaigns .icon{font-size:48px;margin-bottom:20px;opacity:.35}
.no-campaigns h3{font-family:var(--ff-d);font-style:italic;font-size:28px;margin-bottom:12px;color:rgba(244,237,226,.5)}
.no-campaigns p{font-size:14px;color:rgba(244,237,226,.35);line-height:1.65;max-width:400px;margin:0 auto 28px}
@media(max-width:860px){.campaigns-section{padding:50px 22px 80px}}

.back-link{display:inline-flex;align-items:center;gap:8px;font-size:12px;letter-spacing:.07em;text-transform:uppercase;color:rgba(244,237,226,.45);transition:color .25s;margin-bottom:20px}
.back-link:hover{color:var(--bone)}
.back-link::before{content:'←'}
</style>
</head>
<body>
<div class="grain"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">✕</button>
  <div class="lb-inner">
    <div class="lb-sidebar">
      <p class="eyebrow" id="lbCapsule"></p>
      <h3 class="lb-heading" id="lbTitle"></h3>
      <p class="lb-desc" id="lbDesc"></p>
      <span class="lb-badge" id="lbType"></span>
    </div>
    <div class="lb-main">
      <div class="lb-img-wrap" id="lbImg"></div>
      <div class="lb-thumbs" id="lbThumbs"></div>
    </div>
  </div>
  <button class="lb-nav lb-prev" id="lbPrev">‹</button>
  <button class="lb-nav lb-next" id="lbNext">›</button>
</div>

<!-- NAV -->
<nav class="nav" id="nav">
  <a href="index.html" class="nav-mark">NOVA SOLEIL</a>
  <div class="nav-pages" id="navPages"></div>
  <a class="nav-cta" href="index.html#pricing">Book Nova</a>
  <button class="nav-mobile-toggle" id="mobileToggle" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>
<div class="nav-drawer" id="navDrawer">
  <button class="nav-drawer-close" id="drawerClose">✕</button>
  <div id="drawerLinks"></div>
</div>

<!-- CATEGORY HERO — filled by JS -->
<header class="cat-hero" id="catHero">
  <div class="cat-hero-bg" id="catHeroBg"></div>
  <div class="cat-hero-inner">
    <div>
      <a href="index.html" class="back-link">All capsules</a>
      <span class="eyebrow" id="catLabel"></span>
      <span class="cat-hero-icon" id="catIcon"></span>
      <h1 id="catTitle"></h1>
      <p id="catDesc"></p>
    </div>
    <div class="cat-hero-stats">
      <div class="stat"><div class="stat-num" id="statCampaigns">0</div><div class="stat-label">Campaigns</div></div>
      <div class="stat"><div class="stat-num" id="statImages">0</div><div class="stat-label">Images</div></div>
    </div>
  </div>
</header>

<!-- CAMPAIGNS GRID — filled by JS -->
<section class="campaigns-section">
  <div id="campaignsGrid"></div>
</section>

<!-- OTHER CAPSULES -->
<section style="padding:0 60px 80px;border-top:1px solid var(--line)">
  <div style="max-width:1100px;margin:0 auto;padding-top:60px">
    <p class="eyebrow" style="margin-bottom:20px">Explore more</p>
    <div style="display:flex;gap:12px;flex-wrap:wrap" id="otherCapsules"></div>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <a href="index.html" class="footer-logo">NOVA SOLEIL</a>
  <div class="footer-links" id="footerLinks"></div>
  <a class="footer-email" id="footerEmail"></a>
  <div class="footer-social" id="footerSocial"></div>
  <p class="footer-fine">© 2026 Nova Soleil. All imagery is AI-generated.</p>
</footer>

<script>var PAGE_CAPSULE = 'shoes';</script>
<script src="data.js"></script>
<script src="shared.js"></script>
</body>
</html>
